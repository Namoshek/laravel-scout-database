name: 'Test SQLite'

on:
  workflow_call:
    inputs:
      php-version:
        description: 'The PHP version to build against'
        type: string
        required: true
      dependency-versions:
        description: 'Whether to test against the highest or lowest dependency versions. Values: highest, lowest'
        type: string
        required: true
      db-connection:
        description: 'The SQL connection of PHPUnit that is used for the tests.'
        type: string
        required: true

jobs:
  test_mssql:
    name: 'Test SQLite on PHP ${{ inputs.php-version }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: pcov

      - name: Setup problem matchers for PHP
        run: echo "::add-matcher::${{ runner.tool_cache }}/php.json"

      - name: Setup problem matchers for PHPUnit
        run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install composer dependencies
        uses: ramsey/composer-install@4.0.0
        with:
          dependency-versions: ${{ inputs.dependency-versions }}

      - name: Run phpunit tests
        run: composer test
        env:
          DB_CONNECTION: '${{ inputs.db-connection }}'
